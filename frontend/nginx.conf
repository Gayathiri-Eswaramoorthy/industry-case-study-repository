server {
  # DEPLOY: Default nginx virtual host serving frontend SPA.
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # DEPLOY: React Router fallback for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # DEPLOY: Keep application API route prefix and proxy to backend service.
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # DEPLOY: Rewrite health endpoint path for frontend-facing /api/actuator/* checks.
  location /api/actuator/ {
    rewrite ^/api/actuator/(.*)$ /actuator/$1 break;
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # DEPLOY: Cache immutable static asset responses aggressively.
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
