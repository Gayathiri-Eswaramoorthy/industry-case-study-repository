# ===============================
# DATABASE CONFIGURATION (LOCAL MYSQL DEFAULT)
# ===============================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/icr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=0

# ===============================
# JPA CONFIGURATION
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.check_nullability=true

# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=${PORT:8080}
spring.mvc.throw-exception-if-no-handler-found=false

# ===============================
# SECURITY / CORS
# ===============================

jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey12}
jwt.expiration-ms=${JWT_EXPIRY_MS:3600000}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# ===============================
# STORAGE CONFIGURATION
# ===============================

storage.type=local
app.storage.local.base-dir=uploads
